name: AURAX CI/CD Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: backend

      - name: Run MLM E2E Verification Tests
        run: npm run test-mlm
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/aurex-test
          JWT_SECRET: aurex_jwt_secret_test_2026
          JWT_REFRESH_SECRET: aurex_refresh_secret_test_2026
          NODE_ENV: test

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
